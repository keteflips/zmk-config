name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3
    with:
      # Esto combina el mensaje del commit y el número de ejecución de GitHub
      archive_name: "zmk-firmware-${{ github.event.head_commit.message }}_run${{ github.run_number }}"
